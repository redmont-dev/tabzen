version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@latest --activate
            - pnpm install
        build:
          commands:
            - pnpm build:site
      artifacts:
        baseDirectory: packages/site/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: packages/site
