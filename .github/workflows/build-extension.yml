name: Build Extension

on:
  push:
    branches: [main]
    paths:
      - 'packages/extension/**'
      - 'shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/extension/**'
      - 'shared/**'

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Run unit tests
        run: pnpm test:ext

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: packages/extension

      - name: Build extension
        run: pnpm build:ext

      - name: Run E2E tests with xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm test:e2e

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Build extension
        run: pnpm build:ext

      - name: Create zip
        run: cd packages/extension/dist && zip -r ../../../tabzen-extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabzen-extension
          path: tabzen-extension.zip
          retention-days: 30
