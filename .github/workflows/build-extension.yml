name: Build Extension

on:
  push:
    branches: [main]
    paths:
      - 'packages/extension/**'
      - 'shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/extension/**'
      - 'shared/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Run tests
        run: pnpm test:ext

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Build extension
        run: pnpm build:ext

      - name: Create zip
        run: cd packages/extension/dist && zip -r ../../../tabzen-extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabzen-extension
          path: tabzen-extension.zip
          retention-days: 30
